{% extends "base.html" %}

{% block title %}Alerts - Crop Monitoring{% endblock %}

{% block page_title %}Field Alerts{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="card bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500">Critical</p>
                    <p class="text-3xl font-bold text-red-600" id="criticalCount">0</p>
                </div>
                <div class="bg-red-100 rounded-full p-3">
                    <i class="fas fa-exclamation-circle text-red-600 text-2xl"></i>
                </div>
            </div>
        </div>
        <div class="card bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500">High</p>
                    <p class="text-3xl font-bold text-orange-600" id="highCount">0</p>
                </div>
                <div class="bg-orange-100 rounded-full p-3">
                    <i class="fas fa-exclamation-triangle text-orange-600 text-2xl"></i>
                </div>
            </div>
        </div>
        <div class="card bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500">Medium</p>
                    <p class="text-3xl font-bold text-yellow-600" id="mediumCount">0</p>
                </div>
                <div class="bg-yellow-100 rounded-full p-3">
                    <i class="fas fa-exclamation text-yellow-600 text-2xl"></i>
                </div>
            </div>
        </div>
        <div class="card bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500">Low</p>
                    <p class="text-3xl font-bold text-blue-600" id="lowCount">0</p>
                </div>
                <div class="bg-blue-100 rounded-full p-3">
                    <i class="fas fa-info-circle text-blue-600 text-2xl"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Alerts List -->
    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-gray-900">Active Alerts</h3>
            <button onclick="refreshAlerts()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-sync-alt mr-2"></i>
                Refresh
            </button>
        </div>
        <div class="p-6">
            <div id="alertsContainer" class="space-y-4">
                <!-- Alerts will be loaded here -->
            </div>
            <div id="noAlerts" class="text-center py-12 hidden">
                <i class="fas fa-check-circle text-6xl text-green-300 mb-4"></i>
                <p class="text-gray-500 text-lg">No active alerts</p>
                <p class="text-gray-400 text-sm mt-2">All your fields are in good health!</p>
            </div>
        </div>
    </div>
</div>

<script>
async function loadAlerts() {
    try {
        const response = await fetch('/api/alerts');
        const alerts = await response.json();
        
        // Update summary counts
        const counts = {
            Critical: 0,
            High: 0,
            Medium: 0,
            Low: 0
        };
        
        alerts.forEach(alert => {
            counts[alert.priority]++;
        });
        
        document.getElementById('criticalCount').textContent = counts.Critical;
        document.getElementById('highCount').textContent = counts.High;
        document.getElementById('mediumCount').textContent = counts.Medium;
        document.getElementById('lowCount').textContent = counts.Low;
        
        // Display alerts
        const container = document.getElementById('alertsContainer');
        const noAlerts = document.getElementById('noAlerts');
        
        if (alerts.length === 0) {
            container.classList.add('hidden');
            noAlerts.classList.remove('hidden');
        } else {
            container.classList.remove('hidden');
            noAlerts.classList.add('hidden');
            
            container.innerHTML = alerts.map(alert => {
                const priorityColors = {
                    Critical: 'bg-red-50 border-red-200',
                    High: 'bg-orange-50 border-orange-200',
                    Medium: 'bg-yellow-50 border-yellow-200',
                    Low: 'bg-blue-50 border-blue-200'
                };
                
                const priorityIcons = {
                    Critical: 'fa-exclamation-circle text-red-600',
                    High: 'fa-exclamation-triangle text-orange-600',
                    Medium: 'fa-exclamation text-yellow-600',
                    Low: 'fa-info-circle text-blue-600'
                };
                
                const alertTypeIcons = {
                    'Low Vegetation Health': 'fa-leaf',
                    'Declining Vegetation': 'fa-chart-line-down',
                    'Low Soil Moisture': 'fa-droplet',
                    'Nutrient Deficiency': 'fa-flask',
                    'Pest Alert': 'fa-bug',
                    'Disease Warning': 'fa-virus'
                };
                
                return `
                    <div class="border ${priorityColors[alert.priority]} rounded-lg p-6 transition-all hover:shadow-md">
                        <div class="flex items-start justify-between">
                            <div class="flex items-start space-x-4 flex-1">
                                <div class="flex-shrink-0">
                                    <i class="fas ${priorityIcons[alert.priority]} text-3xl"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-2">
                                        <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${
                                            alert.priority === 'Critical' ? 'bg-red-100 text-red-800' :
                                            alert.priority === 'High' ? 'bg-orange-100 text-orange-800' :
                                            alert.priority === 'Medium' ? 'bg-yellow-100 text-yellow-800' :
                                            'bg-blue-100 text-blue-800'
                                        }">
                                            ${alert.priority} Priority
                                        </span>
                                        <span class="text-sm text-gray-500">
                                            <i class="fas ${alertTypeIcons[alert.alert_type] || 'fa-exclamation'} mr-1"></i>
                                            ${alert.alert_type}
                                        </span>
                                    </div>
                                    <h4 class="text-lg font-semibold text-gray-900 mb-1">
                                        ${alert.field_name} - ${alert.crop_type}
                                    </h4>
                                    <p class="text-gray-700 mb-3">${alert.message}</p>
                                    ${alert.suggestion ? `
                                        <div class="bg-white bg-opacity-70 rounded-lg p-4 border-l-4 ${
                                            alert.priority === 'Critical' ? 'border-red-500' :
                                            alert.priority === 'High' ? 'border-orange-500' :
                                            alert.priority === 'Medium' ? 'border-yellow-500' :
                                            'border-blue-500'
                                        }">
                                            <div class="flex items-start">
                                                <i class="fas fa-lightbulb text-yellow-500 mr-2 mt-1"></i>
                                                <div>
                                                    <p class="text-sm font-medium text-gray-900 mb-1">Recommendation:</p>
                                                    <p class="text-sm text-gray-700">${alert.suggestion}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ` : ''}
                                    <div class="mt-4 flex items-center space-x-4 text-sm text-gray-500">
                                        <span>
                                            <i class="fas fa-clock mr-1"></i>
                                            ${new Date(alert.created_at).toLocaleString()}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <button onclick="resolveAlert(${alert.id})" 
                                    class="ml-4 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition flex items-center">
                                <i class="fas fa-check mr-2"></i>
                                Resolve
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
    } catch (error) {
        console.error('Error loading alerts:', error);
        showNotification('Error loading alerts', 'error');
    }
}

async function resolveAlert(alertId) {
    try {
        const response = await fetch(`/api/alert/${alertId}/resolve`, {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            showNotification('Alert resolved successfully', 'success');
            loadAlerts();
        }
    } catch (error) {
        console.error('Error resolving alert:', error);
        showNotification('Error resolving alert', 'error');
    }
}

async function refreshAlerts() {
    showNotification('Refreshing alerts...', 'success');
    
    // Update all fields
    try {
        const response = await fetch('/api/fields');
        const fields = await response.json();
        
        for (const field of fields) {
            await fetch(`/api/field/${field.id}/update-ndvi`, {
                method: 'POST'
            });
        }
        
        showNotification('Alerts updated successfully', 'success');
        setTimeout(loadAlerts, 2000);
    } catch (error) {
        console.error('Error refreshing alerts:', error);
        showNotification('Error refreshing alerts', 'error');
    }
}

// Initialize
loadAlerts();

// Auto-refresh every 5 minutes
setInterval(loadAlerts, 300000);
</script>
{% endblock %}
